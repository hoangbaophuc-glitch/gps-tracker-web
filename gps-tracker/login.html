<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng nhập hệ thống GPS Tracker Pro - Nhóm 7 HCMUTE">
  <title>ĐĂNG NHẬP - GPS TRACKER PRO</title>
  <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
</head>

<body class="portal-body">

  <div class="portal-wrapper">
    <div class="portal-header">
      <img src="/picture/logo-ute.png" alt="HCMUTE Logo" class="school-logo">
      <h1 class="school-name">TRƯỜNG ĐẠI HỌC SƯ PHẠM KỸ THUẬT<br>TP.HCM</h1>
    </div>

    <div class="portal-card">
      <h2 class="portal-title">ĐĂNG NHẬP</h2>
      <p class="portal-subtitle">Hệ thống GPS Tracker Pro</p>

      <div class="portal-input-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Nhập mã số sinh viên / tài khoản">
      </div>

      <div class="portal-input-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu">
      </div>

      <button id="login-btn" class="btn-portal-submit">Đăng nhập</button>

      <button class="btn-portal-google" id="google-student-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google G" class="google-icon">
        Đăng nhập với Google Sinh viên
      </button>

      <button class="btn-portal-google" id="google-teacher-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google G" class="google-icon">
        Đăng nhập với Google Giảng viên
      </button>

      <div id="login-error">Tên đăng nhập hoặc mật khẩu sai!</div>

      <div class="portal-card-footer">
        <a href="#" class="forgot-link">Quên mật khẩu</a>
      </div>
    </div>
  </div>

  <script type="module" src="/src/login.js"></script>
</body>

</html>
