<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tổng quan đề tài</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body class="overview-page">

  <header class="overview-header">
    <div class="logo-container">
      <img src="picture/logo-ute.png" alt="Logo Trường" class="logo-circle">
      <img src="picture/logo-khoa.png" alt="Logo Khoa" class="logo-circle">
    </div>
    
    <div class="title-container">
      <div class="title-box">
        <h1>TỔNG QUAN ĐỀ TÀI</h1>
      </div>
    </div>
    
    <div class="header-spacer"></div>
  </header>

  <main class="overview-grid">
    
    <div class="content-box box-1">
      <div class="core-features">
        <h3>Tính năng cốt lõi</h3>
        <ul>
          <li>Định vị thời gian thực (GPS)</li>
          <li>Cảnh báo sự cố té ngã (MPU6050)</li>
          <li>Điều khiển còi báo từ xa</li>
          <li>Lưu trữ và xuất dữ liệu Excel</li>
        </ul>
      </div>

      <div class="project-info">
        <h3>Thông tin dự án</h3>
        <p><strong>Môn học:</strong> Cơ sở và ứng dụng IoTs</p>
        <p><strong>Thực hiện:</strong> Nhóm 7 - HCMUTE</p>
      </div>

      <footer class="box-footer">
        <p>&copy; 2026 GPS Tracker Pro</p>
      </footer>
    </div>

    <div class="content-box box-2">
      <img src="picture/gps-tracker.jpg" alt=" Giao diện GPS Tracker" class="preview-image">
      
      <div class="hover-overlay">
        <a href="index.html" class="view-detail-btn">Xem chi tiết</a>
      </div>
    </div>

    <div class="content-box box-3">
      <img src="hardware-preview.jpg" alt="Mạch thực tế" class="preview-image">
  
      <div class="hover-overlay">
        <a href="index.html" class="view-detail-btn">Xem chi tiết</a>
      </div>
    </div>

  </main>

</body>
</html>
